name: Deploy demo to EC2

on:
  push:
    branches: [main]
    paths:
      - "apps/demo/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-demo.yml"
  workflow_dispatch:

concurrency:
  group: deploy-demo
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter cesium-drawing-demo build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            apps/demo/dist/ \
            "${{ secrets.EC2_USER || 'ubuntu' }}@${{ secrets.EC2_HOST }}:/var/www/cesium-drawing-demo/"
